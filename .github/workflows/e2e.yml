name: E2E

on:
  workflow_dispatch:
  pull_request:

env:
  CONVEX_ENV: |
    DISABLE_BEACON=true
    PORT=3210
    SITE_PROXY_PORT=3211
    DASHBOARD_PORT=6791
    CONVEX_CLOUD_ORIGIN=http://127.0.0.1:3210
    CONVEX_SITE_ORIGIN=http://127.0.0.1:3211

jobs:
  contract:
    name: Adversarial IDOR (live backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: bun install --frozen-lockfile
      - name: Start self-hosted Convex backend
        run: |
          cd self-hosted
          printf '%s\n' "$CONVEX_ENV" > .env
          docker compose up -d backend
      - name: Wait for backend health
        run: for i in $(seq 1 60); do curl -fsS http://127.0.0.1:3210/version && echo " ok" && break; sleep 2; done
      - name: Deploy functions
        run: |
          KEY=$(cd self-hosted && docker compose exec -T backend ./generate_admin_key.sh | tr -d '\r' | grep -F '|' | tail -1 | tr -d '[:space:]')
          node scripts/generateKeys.mjs
          cd packages/backend
          export CONVEX_SELF_HOSTED_URL='http://127.0.0.1:3210' CONVEX_SELF_HOSTED_ADMIN_KEY="$KEY"
          CVX="node ../../node_modules/convex/bin/main.js"
          $CVX env set -- JWKS "$(cat /tmp/jwks)"
          $CVX env set -- JWT_PRIVATE_KEY "$(cat /tmp/jwt_private_key)"
          $CVX env set SITE_URL http://localhost:3000
          $CVX deploy -y
      - name: Adversarial IDOR / RBAC suite
        run: CONVEX_URL=http://127.0.0.1:3210 node e2e/p2-idor.js
      - name: Backend logs (on failure)
        if: failure()
        run: cd self-hosted && docker compose logs --tail=120 backend

  browser:
    name: Browser E2E (live stack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: bun install --frozen-lockfile
      - name: Start self-hosted Convex backend
        run: |
          cd self-hosted
          printf '%s\n' "$CONVEX_ENV" > .env
          docker compose up -d backend
      - name: Wait for backend health
        run: for i in $(seq 1 60); do curl -fsS http://127.0.0.1:3210/version && echo " ok" && break; sleep 2; done
      - name: Deploy functions
        run: |
          KEY=$(cd self-hosted && docker compose exec -T backend ./generate_admin_key.sh | tr -d '\r' | grep -F '|' | tail -1 | tr -d '[:space:]')
          node scripts/generateKeys.mjs
          cd packages/backend
          export CONVEX_SELF_HOSTED_URL='http://127.0.0.1:3210' CONVEX_SELF_HOSTED_ADMIN_KEY="$KEY"
          CVX="node ../../node_modules/convex/bin/main.js"
          $CVX env set -- JWKS "$(cat /tmp/jwks)"
          $CVX env set -- JWT_PRIVATE_KEY "$(cat /tmp/jwt_private_key)"
          $CVX env set SITE_URL http://localhost:3000
          $CVX deploy -y
      - name: Bootstrap admin account
        run: CONVEX_URL=http://127.0.0.1:3210 node e2e/ci-bootstrap.js
      - name: Build app
        env:
          NEXT_PUBLIC_CONVEX_URL: http://127.0.0.1:3210
          CONVEX_URL: http://127.0.0.1:3210
        run: cd apps/app && bun run build
      - name: Start app
        env:
          NEXT_PUBLIC_CONVEX_URL: http://127.0.0.1:3210
          CONVEX_URL: http://127.0.0.1:3210
          PORT: "3000"
        run: |
          cd apps/app
          bun run start > /tmp/app.log 2>&1 &
          for i in $(seq 1 60); do curl -fsS http://localhost:3000/en/login >/dev/null && echo "app up" && break; sleep 2; done
      - name: Install Playwright
        run: cd e2e && bun install && bunx playwright install --with-deps chromium
      - name: Run browser suites
        env:
          E2E_BASE_URL: http://localhost:3000
        run: |
          cd e2e
          for s in p-sidebar p-feedback p-home p-notif p-cmdk p-paging p-sessions; do
            echo "::group::$s"; node "$s.js" || { echo "::endgroup::"; exit 1; }; echo "::endgroup::"
          done
      - name: App + backend logs (on failure)
        if: failure()
        run: |
          echo "=== app log ==="; tail -60 /tmp/app.log || true
          echo "=== backend log ==="; cd self-hosted && docker compose logs --tail=120 backend
