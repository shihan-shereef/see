# Self-hosted error monitoring — GlitchTip (Sentry-protocol compatible).
# The app's @sentry/nextjs SDK reports here unchanged; just point NEXT_PUBLIC_SENTRY_DSN
# at the project DSN this stack generates. Provide SECRET_KEY + GLITCHTIP_DOMAIN via .env.
x-environment: &default-environment
  DATABASE_URL: postgres://postgres:postgres@postgres:5432/postgres
  SECRET_KEY: ${SECRET_KEY}
  PORT: 8080
  EMAIL_URL: consolemail://
  GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN}
  DEFAULT_FROM_EMAIL: noreply@glitchtip.local
  CELERY_WORKER_AUTOSCALE: "1,2"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped
  redis:
    image: redis
    restart: unless-stopped
  web:
    image: glitchtip/glitchtip
    depends_on: [postgres, redis]
    ports:
      - "8000:8080"
    environment: *default-environment
    restart: unless-stopped
  worker:
    image: glitchtip/glitchtip
    command: ./bin/run-celery-with-beat.sh
    depends_on: [postgres, redis]
    environment: *default-environment
    restart: unless-stopped
  migrate:
    image: glitchtip/glitchtip
    depends_on: [postgres, redis]
    command: ./manage.py migrate
    environment: *default-environment

volumes:
  pg-data:
